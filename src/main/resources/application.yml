spring:
  datasource:
    url: jdbc:mysql://localhost:3306/edu3d_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password:      # ? change ici
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update           # crťe les tables automatiquement
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

app:
  jwt:
    secret: edu3d-secret-key-super-longue-pour-la-securite-2024
    expiration: 86400000         # 24h en millisecondes

server:
  port: 8080
